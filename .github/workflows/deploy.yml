name: Deploy Delift Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate locales
        run: npm run validate:locales

      - name: Validate source assets
        run: npm run validate:assets

      - name: Build website
        run: npm run build

      - name: Validate built assets
        run: npm run validate:dist-assets

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload website
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      - name: Deploy website
        id: deployment
        uses: actions/deploy-pages@v5
